# Jupytext global config — symlinked to ~/.jupyter/jupytext.toml by `make setup-jupyter`.
# Docs: https://jupytext.readthedocs.io/en/latest/config.html
#
# When a notebook is paired with a text file, save it as py:percent — the same
# `# %%` cell format Neovim/molten runs. Does NOT pair anything on its own.
preferred_jupytext_formats_save = "py:percent"

# Uncomment to AUTOMATICALLY pair every notebook with a .py:percent script
# (edit the .py in Neovim, keep the .ipynb for JupyterLab). This changes how
# JupyterLab writes notebooks, so it is opt-in:
# default_jupytext_formats = "ipynb,py:percent"
