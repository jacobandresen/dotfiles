# =============================================================================
# tmux configuration
# =============================================================================

# ----------------------------------------------------------------------------
# General settings
# ----------------------------------------------------------------------------

# Enable extended keys for more key combinations
set -g extended-keys on

# Start window and pane numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support (scroll, resize panes, click to select window)
set -g mouse on

# Set default terminal to screen-256color for better color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Disable automatic window renaming
set -g allow-rename off

# ----------------------------------------------------------------------------
# Prefix and key bindings
# ----------------------------------------------------------------------------

# Use C-s as prefix (C-b is default and conflicts with bash backward-word)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Vi mode for copy mode
setw -g mode-keys vi

# ----------------------------------------------------------------------------
# Appearance
# ----------------------------------------------------------------------------

# Status bar
set -g status on
set -g status-interval 1
set -g status-justify centre
set -g status-left-length 20
set -g status-right-length 50

# Left status: session name
set -g status-left "[#S] "

# Right status: time, date, host, user, window count
set -g status-right "#{prefix_indicator} | %H:%M %d-%b-%y | %h | %u | %z windows"

# Current window style
set -g window-status-current-style "bg=green,fg=black,bold"
set -g window-status-current-format "#I:#W*"

# Other windows style
set -g window-status-style "bg=default,fg=default"
set -g window-status-format "#I:#W"

# Window with activity
set -g window-status-activity-style "bg=yellow,fg=black"

# Pane border
set -g pane-border-status off
set -g pane-border-indicators "top-right"
set -g pane-border-format "#{pane_index}"

# ----------------------------------------------------------------------------
# Window and pane behavior
# ----------------------------------------------------------------------------

# Split panes using | and - (like vim)
bind | split-window -h
bind - split-window -v

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Toggle mouse on/off with prefix + m
bind m set -g mouse \; display-message "Mouse: #{?mouse,on,off}"

# Toggle status bar with prefix + b
bind b set -g status \; display-message "Status bar: #{?status,on,off}"

# Toggle synchronize-panes with prefix + y
bind y setw synchronize-panes \; display-message "Pane synchronization: #{?synchronize-panes,on,off}"

# Quick pane switching with vi-style keys
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ----------------------------------------------------------------------------
# Copy mode (vi-style)
# ----------------------------------------------------------------------------

# Enter copy mode with prefix + [
bind [ copy-mode

# Vi-style copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi C-v send-keys -X copy-selection
bind -T copy-mode-vi Escape send-keys -X cancel

# Use system clipboard
set -g set-clipboard on
set -g mouse-resize-pane on
set -g mouse-select-pane on
set -g mouse-select-window on

# ----------------------------------------------------------------------------
# History and scrollback
# ----------------------------------------------------------------------------

# Large scrollback buffer
set -g history-limit 10000
set -g history-file ~/.tmux_history

# Unlimited scrollback in copy mode (search entire buffer)
set -g buffer-limit 50

# ----------------------------------------------------------------------------
# Window and session management
# ----------------------------------------------------------------------------

# New window shortcuts
bind c new-window
bind % split-window -h
bind '"' split-window -v

# Close window/pane
bind x confirm-before -p "kill-pane? (y/n)" kill-pane
bind X confirm-before -p "kill-window? (y/n)" kill-window

# Switch to window by number (1-9, 0 for last)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t :+

# Next/previous window
bind n next-window
bind p previous-window

# Swap panes
bind { swap-pane -U
bind } swap-pane -D

# ----------------------------------------------------------------------------
# Layouts and resize
# ----------------------------------------------------------------------------

# Resize panes by 5 cells
bind -n C-Up resize-pane -U 5
bind -n C-Down resize-pane -D 5
bind -n C-Left resize-pane -L 5
bind -n C-Right resize-pane -R 5

# Equalize pane sizes
bind E equalize-pane

# Toggle between layouts
bind Space next-layout

# ----------------------------------------------------------------------------
# Search
# ----------------------------------------------------------------------------

# Search forward/backward in copy mode
bind -T copy-mode-vi / send-keys -X search-forward
bind -T copy-mode-vi ? send-keys -X search-backward
bind -T copy-mode-vi n send-keys -X search-again
bind -T copy-mode-vi N send-keys -X search-reverse

# ----------------------------------------------------------------------------
# Misc quality of life
# ----------------------------------------------------------------------------

# Display message duration (milliseconds)
set -g display-time 2000

# Confirm before killing sessions
set -g confirm-before -p "kill-session? (y/n)" kill-session
set -g confirm-before -p "kill-server? (y/n)" kill-server

# Enable focus events for terminal notifications
set -g focus-events on

# Automatically set window title
set -g set-titles on
set -g set-titles-string "#S:#I:#W - #{pane_current_command}"

# ----------------------------------------------------------------------------
# Hooks (for tmux >= 3.2)
# ----------------------------------------------------------------------------

# Run shell commands on new windows
# set-hook -g after-new-window 'run-shell "echo \"New window: #S:#I\""'

# =============================================================================
# End of configuration
# =============================================================================
